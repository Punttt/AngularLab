<div class="heading-box">
    <h2>Konvertera enheter</h2>
</div>
<div class="container">

    <div class="wrapper">
        <label for="celsius">Celsius:</label>
        <input type="number" id="celsius" [(ngModel)]="celsius">    
        <button class="btn" (click)="convertCelsius()">Konvertera</button> 
        <p>Resultat: {{resCelsius}}</p> 
    </div>


    <div class="wrapper">
        <label for="meter">Meter:</label>
        <input type="number" id="meter" [(ngModel)]="meter">
        <button class="btn" (click)="convertMeter()">Konvertera</button> 
        <p>Resultat: {{resMeter}}</p>
    </div>
</div>
